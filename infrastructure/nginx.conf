# ============================================================
# GeoArbitrage HQ — nginx Reverse Proxy
#
# Aufgaben:
# 1. n8n Editor ueber Tailscale VPN (Port 443)
# 2. Telegram Webhook ueber Cloudflare (Port 80)
# 3. Alles andere blocken (return 444)
#
# WICHTIG:
# - Timeouts muessen 600s sein (Agent-Chains brauchen 4+ LLM-Calls)
# - Cloudflare Flexible SSL: Cloudflare terminiert SSL, nginx braucht
#   KEINEN SSL-Block fuer Cloudflare-Domains
# - $http_cf_connecting_ip fuer echte Client-IP (statt Cloudflare-IP)
# ============================================================

events {
    worker_connections 1024;
}

http {
    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'cf_ip=$http_cf_connecting_ip';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # --- Timeouts (KRITISCH fuer Agent-Chains!) ---
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;

    # --- Upstream ---
    upstream n8n {
        server n8n:5678;
    }

    # ============================================================
    # Server 1: Cloudflare (Port 80)
    # NUR /webhook/telegram erlauben, alles andere blocken
    # ============================================================
    server {
        listen 80;
        server_name webhook.YOUR_DOMAIN.com;

        # Telegram Webhook — einziger oeffentlicher Pfad
        location /webhook/telegram {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Alles andere: Connection droppen (kein Response)
        location / {
            return 444;
        }
    }

    # ============================================================
    # Server 2: Tailscale VPN (Port 443)
    # n8n Editor — NUR ueber VPN erreichbar
    # ============================================================
    server {
        listen 443 ssl;
        server_name YOUR_TAILSCALE_HOSTNAME;

        # Tailscale SSL-Zertifikate
        # ssl_certificate /path/to/cert.pem;
        # ssl_certificate_key /path/to/key.pem;

        location / {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default: Alles droppen
    server {
        listen 80 default_server;
        return 444;
    }
}
